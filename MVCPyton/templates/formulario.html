<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Producto</title>
    <style>
        body   { font-family: Arial, sans-serif; max-width: 450px; margin: 40px auto; padding: 0 20px; }
        h1     { color: #2c3e50; }
        label  { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc;
                         border-radius: 4px; box-sizing: border-box; font-size: 15px; }
        .error { background: #fdecea; color: #c0392b; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .btn-guardar { margin-top: 20px; width: 100%; padding: 10px;
                       background: #27ae60; color: white; border: none;
                       border-radius: 4px; font-size: 16px; cursor: pointer; }
        .btn-guardar:hover { background: #219150; }
        a { color: #2980b9; }
    </style>
</head>
<body>

    <h1>Nuevo Producto</h1>

    {% if error %}
        <div class="error">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/nuevo">

        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej: Monitor 27''" required>

        <label for="precio">Precio ($)</label>
        <input type="number" id="precio" name="precio" min="0" step="0.01" placeholder="Ej: 1500.00" required>

        <label for="categoria">Categoría</label>
        <select id="categoria" name="categoria" required>
            <option value="">-- Selecciona --</option>
            <option value="Electrónica">Electrónica</option>
            <option value="Muebles">Muebles</option>
            <option value="Ropa">Ropa</option>
            <option value="Otro">Otro</option>
        </select>

        <button type="submit" class="btn-guardar">Guardar producto</button>
    </form>

    <br>
    <a href="/">← Cancelar y volver</a>

</body>
</html>
